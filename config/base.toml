# Linux x86_64 ABI conformance fixture — raw Linux syscalls; the abi key makes
# xtask stamp ELFOSABI_LINUX so SYS_SPAWN routes it through linux_exec.
linux_hello = { abi = "linux" }
athbridge_host = {}
# Per-process AthBridge launcher: one Windows .exe = one AthenaOS process. The
# parent writes a launch target to a well-known VFS path, spawns this, and reaps
# its exit code (docs/components/athbridge-process-model.md option (b)).
athbridge_run = {}
amdgpud = {}
i915d = {}
nvidiad = {}
# Ath-script interpreter daemon: drains queued >64 KiB scripts
# (SCRIPT_FETCH/COMPLETE); persistent, spawned without wait.
athlangd = {}
athinstaller = {}
