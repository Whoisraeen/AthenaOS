# AthenaOS crate ownership manifest.
#
# Owner directive (2026-06): development is CONSOLIDATED under `opus`, the lead
# developer, who has full read/write access to every crate. Guardrail scripts
# (scripts/ownership-lock.sh) grant opus a full-access bypass; the per-crate map
# below is retained as a SUBSYSTEM AREA map — it documents intent and navigation
# (which crate is the filesystem, which is audio, …), NOT an access boundary.
#
# The architecture-gate (scripts/architecture-gate.sh) still runs for opus:
# no Linux clones (§R7), no deleted AthGuard capability checks, the R10
# 4-artifact contract for new kernel modules, and the [interface] sign-off for
# ath_abi / ath_driver_api. Full access, same quality bar.
#
# `gemini` and `composer` are retained as historical co-development identities;
# if reactivated they remain constrained to the areas marked with their name.
#
# RULES:
#   * Concept doc (LEGACY_GAMING_CONCEPT.md) wins every conflict.
#   * Interface changes (ath_abi, ath_driver_api, root Cargo.toml, syscall
#     surface) carry the `[interface]` tag and ATHENA_AGENT=opus.
#   * A crate appears exactly once. New crates are added here before commit.

[meta]
version = 2
agents = ["opus", "gemini", "composer"]
lead = "opus"                     # full-access lead developer (ownership-lock bypass)
concept_doc = "LEGACY_GAMING_CONCEPT.md"
checklist = "MasterChecklist.md"

# ── Opus-only meta paths (interface + build contract + governance) ───────────
# Still meaningful if a constrained agent is ever reactivated. Opus owns these.
[meta.opus_only_paths]
paths = [
  "agents/",
  "scripts/",
  ".git/hooks/pre-commit",
  "components/ath_abi/",
  "components/ath_driver_api/",
  "Cargo.toml",
  "docs/SYSCALL_TABLE.md",
  ".gitignore",
  "CLAUDE.md",
  ".gemini/",
  ".cursor/rules/",
]

# ── Shared paths (any agent may edit) ────────────────────────────────────────
[meta.shared_paths]
prefixes = ["docs/", "MasterChecklist.md", "README.md", "Audit.md", "AGENTS.md"]

# ── Crate ownership (longest-path-prefix match wins) ─────────────────────────
# All crates are owned by opus (lead developer). Grouping comments below record
# the conceptual subsystem area each crate belongs to.
[crates]
# Core slice + interface steward
"kernel" = "opus"
"xtask" = "opus"
"components/athshield" = "opus"
"components/ath_abi" = "opus"
"components/ath_driver_api" = "opus"

# Area: mid-tier subsystems (filesystem, audio, net, graphics API, UI stack)
"components/athfs" = "opus"
