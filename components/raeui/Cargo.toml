[package]
name = "raeui"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "RaeUI — native UI framework on Skia + wgpu. Compositor-aware, GPU-accelerated, glassmorphic by default."

[dependencies]
raegfx = { path = "../raegfx" }
raefont = { path = "../raefont" }
# Shared design tokens (ADR 0003). Re-exported as `raeui::tokens` so the
# design-language handoff name resolves; the single source of truth for the
# palette/accent/radius/motion tokens that apps used to each redefine.
rae_tokens = { path = "../rae_tokens" }
libm = "0.2"
# wgpu + skia-safe require std; gate behind a userspace-only feature so
# the kernel's transitive build doesn't try to compile them. The actual
# wgpu/skia renderer modules use `#[cfg(feature = "gpu_userspace")]`.
wgpu        = { version = "0.19", default-features = false, optional = true }
skia-safe   = { version = "0.73.0", features = ["gpu", "gl", "vulkan", "textlayout"], optional = true }
# cosmic-text: pure-Rust text shaping (HarfBuzz port + swash rasterizer). MIT.
# Handles ligatures, BiDi, font fallback — the hard part of premium text quality.
# Concept §RaeUI: "native rendering, premium feel."
# MasterChecklist OSS references: Phase 8.1 Skia integration (text quality).
# Study cosmic-text/src/layout.rs for glyph positioning fed to wgpu.
cosmic-text = { version = "0.12", optional = true }

[features]
default = []
gpu_userspace = ["wgpu", "skia-safe", "raegfx/gpu_userspace"]
# Enable cosmic-text for premium text shaping alongside Skia
rich_text = ["cosmic-text"]
