# AthenaOS hashing / checksum core: SHA-256, SHA-1, MD5, CRC32 + lowercase hex
# (LEGACY_GAMING_CONCEPT.md §"security by default, not by friction" / "the user owns
# the machine") — so a downloaded file's integrity can be verified locally
# against a publisher's posted checksum, on the user's own machine, with no
# network round-trip and no trust in a third party.
#
# `#![cfg_attr(not(test), no_std)]` (the ath_json / ath_tokens pattern): the lib
# is `no_std` + `alloc` in every shipped build and toggles to `std` only under
# `cfg(test)` for the host KAT harness. Zero dependencies, `#![forbid(unsafe_code)]`,
# never-panic. Run the FAIL-able proof (NIST/RFC known-answer vectors) with
# `cargo test -p ath_hash` — no QEMU, no image build.

[dependencies]
