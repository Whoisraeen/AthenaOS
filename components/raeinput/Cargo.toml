[package]
name = "raeinput"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "RaeInput — unified gamepad + input daemon. Normalizes USB/Bluetooth HID for SCHED_GAME dispatch."

[dependencies]
# gilrs: pure-Rust gamepad library. Handles DualSense, Xbox, and generic HID gamepads.
# Apache-2.0 / MIT. Requires std — runs in sandboxed userspace daemon, NOT the kernel.
# Concept alignment §Gaming: "DualSense + Xbox + every controller with full feature parity."
# MasterChecklist Phase 12.2: Universal Controller Support.
gilrs = { version = "0.10", optional = true, default-features = false }

[features]
default = []
# Enable live gamepad support via gilrs in the userspace raeinput daemon
gamepad = ["gilrs"]
