[package]
name = "athkit"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "AthKit — app development SDK. Rust-first, declarative."

[features]
# `host` lets a std consumer (e.g. the `tools/ui_screenshot` harness, which links
# `apps/files` -> `athkit` to render the LIVE Files surface) link this crate
# without the bare-ELF runtime lang items. With `host` on, std supplies the
# panic handler, alloc-error handler, and global allocator, so athkit must NOT
# define its own (doing so triggers E0152 `duplicate lang item panic_impl`).
# Off (the normal `--target x86_64-unknown-none` ELF build) the behavior is
# byte-identical to before this feature existed.
host = []

[dependencies]
athgfx = { path = "../athgfx" }
