[package]
name = "athweb"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "RaeWeb — web rendering engine for AthenaOS"

[dependencies]
# The live substrate this engine renders/loads through. All four are no_std
# (athgfx/athnet/ath_json are `cfg_attr(not(test), no_std)`; ath_tokens is no_std),
# so they keep athweb's `#![no_std]` link clean. This single block de-islands the
# crate (docs/research/web-engine.md §"the crate can't even *see* athnet…").
athgfx = { path = "../athgfx" }       # paint target: Canvas draw_text_aa / fill_rounded_rect[_shadow]
athnet = { path = "../athnet" }       # resource loader: http1::fetch_with over HttpTransport
ath_json = { path = "../ath_json" }   # PWA manifest + future fetch()-API JSON
ath_tokens = { path = "../ath_tokens" } # §6 type ramp / default styling cohesion (TypeStyle)
