# AthenaOS regular-expression engine — a never-panic, zero-dependency, `no_std`
# Thompson-NFA matcher (LEGACY_GAMING_CONCEPT.md §"The user owns the machine"). Broadly
# useful text infrastructure: find/replace in editors, input validation, search.
#
# The NFA is simulated with a parallel-state Pike VM — NO backtracking — so an
# untrusted pattern run against untrusted text CANNOT trigger catastrophic
# backtracking / ReDoS. Matching is linear in (text length * NFA states); the
# compiled program is size-bounded so a pathological pattern is rejected at
# compile time rather than exhausting memory.
#
# `#![cfg_attr(not(test), no_std)]` (the rae_calc / rae_json pattern) so the lib
# is `no_std` + `alloc` in every shipped build and toggles to `std` only under
# `cfg(test)` for the host KAT harness. Run the FAIL-able proof with
# `cargo test -p rae_regex` — no QEMU, no image build. Wired into no consumer
# this slice (editor find/replace is an apps-lane follow-up).

