# AthenaOS diff/patch engine — Myers line diff + unified diff/patch + byte delta.
# The foundation for DELTA OS updates (LEGACY_GAMING_CONCEPT.md §"atomic CoW updates":
# ship only the changed bytes/lines into the inactive A/B slot instead of a full
# image) AND editor change-views / version-control. Foundational, zero-dep,
# never-panic, host-KAT-able pure logic — wired into no consumer this slice.
#
# `#![cfg_attr(not(test), no_std)]` (the rae_json / rae_calc pattern): `no_std` +
# `alloc` in every shipped build, toggling to `std` only under `cfg(test)` for the
# host KAT harness. Run the FAIL-able proof with `cargo test -p rae_diff` — no
# QEMU, no image build. Every parse/apply path treats input as hostile: a
# non-matching patch, a malformed `@@` header, or a truncated patch returns
# `Err`, never panics.

