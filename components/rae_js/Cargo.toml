[package]
name = "rae_js"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# RaeenOS JavaScript engine — the foundation slice: an ECMAScript LEXER + PARSER
# producing an AST. RaeenOS_Concept.md §Compatibility Strategy (criterion #5, "the
# web browser is the universal app runtime; PWAs that feel native"): raeweb already
# renders HTML/CSS but has NO JavaScript, so pages cannot be interactive. This crate
# is the language front-end the future interpreter/runtime + DOM bindings + event
# loop (LATER slices) will sit on. It does NOT execute anything — it turns source
# text into a checked AST and nothing more.
#
# `#![cfg_attr(not(test), no_std)]` (the rae_xlsx / rae_docx pattern): the lib is
# `no_std` + `alloc` in every shipped build and toggles to `std` only under
# `cfg(test)` for the host KAT harness. Run the FAIL-able proof with
# `cargo test -p rae_js` — no QEMU, no image build. Treats every byte as hostile (a
# parser fed untrusted page script is an RCE/DoS surface): `#![forbid(unsafe_code)]`,
# no `unwrap`/`expect`/raw-index-panic is reachable from `parse`, and nesting depth +
# total token/node counts are bounded before allocation so no input can overflow the
# stack or hang. Hand-rolled lexer + recursive-descent/Pratt parser; no external JS
# crate.

# RegExp execution (criterion #5: real web JS uses regex everywhere — form
# validation, parsing, templating). The interpreter REUSES the proven, never-panic,
# ReDoS-safe `rae_regex` engine (Thompson NFA / Pike VM) rather than embedding a
# second regex implementation — consume-only, exactly the LinuxKPI "harvest a proven
# engine" mindset (docs/LINUX_DRIVER_STRATEGY.md). rae_regex is `no_std`+`alloc`.
[dependencies]
rae_regex = { path = "../rae_regex" }
