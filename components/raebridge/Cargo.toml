[package]
name = "raebridge"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "AthBridge — Windows app compatibility layer (Wine/Proton heritage, tightly integrated)."

[dependencies]
raegfx = { path = "../raegfx" }
libm = "0.2"
# iced-x86 — pure-Rust x86/x64 decoder (no_std). The instruction-level engine
# the Win32 path needs for x64 marshaling, SEH unwind-table walking, and
# generating import thunks / inline hooks.
iced-x86 = { version = "1.21", default-features = false, features = ["no_std", "decoder", "intel"] }
# object — robust PE/COFF reader (no_std + alloc), a vetted cross-check for the
# hand-rolled pe_loader (export/import/section tables).
object = { version = "0.36", default-features = false, features = ["read_core", "pe", "unaligned"] }

[dev-dependencies]
# raegfx is already a normal dep, but the host KAT crate (tests/) names
# raegfx::ShaderStage directly, so it must resolve at test-build time too.
raegfx = { path = "../raegfx" }
