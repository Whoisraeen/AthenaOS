[package]
name = "rae_pdf"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# RaeenOS PDF reader — "open my PDFs" (RaeenOS_Concept.md §Compatibility Strategy /
# criterion #5 "does my OS open my files"). A Windows/macOS switcher brings a folder
# of PDFs; an OS that can't open them isn't a daily driver. This is the READER
# (parse + text/structure extraction), distinct from raeprint's pdf.rs GENERATOR.
#
# A PDF is a COS object graph (booleans/numbers/strings/names/arrays/dicts/streams/
# indirect refs) addressed by a cross-reference table or stream, with FlateDecode'd
# content streams. This crate REUSES `rae_deflate` for FlateDecode (no reimplemented
# inflate) and adds a minimal, never-panic COS parser + page-tree walker + content-
# stream text extractor.
#
# `#![cfg_attr(not(test), no_std)]` (the rae_docx / rae_png pattern): the lib is
# `no_std` + `alloc` in every shipped build and toggles to `std` only under
# `cfg(test)` for the host KAT harness. Run the FAIL-able proof with
# `cargo test -p rae_pdf` — no QEMU, no image build. Treats every byte as hostile
# (PDF is a notorious parser-exploitation surface): no `unwrap`/`expect`/raw-index-
# panic is reachable from `Document::open`; object count, decompressed stream size,
# xref entry count, nesting recursion, and indirect-reference resolution depth are
# all bounded before allocation, and total work is capped so a crafted file can
# neither panic nor infinite-loop.

[dependencies]
rae_deflate = { path = "../rae_deflate" }
