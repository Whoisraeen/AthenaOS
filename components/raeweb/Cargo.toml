[package]
name = "raeweb"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "RaeWeb — web rendering engine for RaeenOS"

[dependencies]
# The live substrate this engine renders/loads through. All four are no_std
# (raegfx/raenet/rae_json are `cfg_attr(not(test), no_std)`; rae_tokens is no_std),
# so they keep raeweb's `#![no_std]` link clean. This single block de-islands the
# crate (docs/research/web-engine.md §"the crate can't even *see* raenet…").
raegfx = { path = "../raegfx" }       # paint target: Canvas draw_text_aa / fill_rounded_rect[_shadow]
raenet = { path = "../raenet" }       # resource loader: http1::fetch_with over HttpTransport
rae_json = { path = "../rae_json" }   # PWA manifest + future fetch()-API JSON
rae_tokens = { path = "../rae_tokens" } # §6 type ramp / default styling cohesion (TypeStyle)
