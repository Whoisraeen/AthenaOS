# RaeenOS JSON value model, parser, and serializer (RFC 8259) — the lingua
# franca of web APIs and the RaeStore manifest format (RaeenOS_Concept.md §"web
# apps via PWA support that actually feels native"). Foundational, zero-dep,
# never-panic infrastructure: web fetch/JSON, package manifests, settings/config.
#
# `#![cfg_attr(not(test), no_std)]` (the rae_calc / rae_tokens pattern) so the
# lib is `no_std` + `alloc` in every shipped build and toggles to `std` only
# under `cfg(test)` for the host KAT harness. Run the FAIL-able proof with
# `cargo test -p rae_json` — no QEMU, no image build. Treats all input as
# hostile (an untrusted-input parser): every error path returns `Err`, no
# `unwrap`/`expect`/raw-index panic is reachable from `parse`.

