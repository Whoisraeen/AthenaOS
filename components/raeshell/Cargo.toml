[package]
name = "raeshell"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "RaeShell — the default desktop shell. Familiar enough to switch from Windows or Mac in 10 minutes."

[dependencies]
raegfx = { path = "../raegfx" }
# rae_tokens — the shared design-token home (#![no_std], zero-dep). Single
# source of truth for spacing/radius/type/motion + the accent ramp, so the
# shell stops redefining its own `const ACCENT`/`BAR_BG` palette and re-skins
# coherently with every other surface (docs/design/design-language.md).
rae_tokens = { path = "../rae_tokens" }
# rae_crypto — the shared #![no_std] primitive home. The lock-screen passkey
# manager verifies real ES256 assertion signatures through it (never a homebrew
# or structural-only check); the kernel already links rae_crypto, so the
# bare-metal no_std link of raeshell picks up nothing new heavy.
rae_crypto = { path = "../rae_crypto" }
# vte — pure-Rust ANSI/VT escape parser (the Alacritty engine), the base for
# RaeShell's terminal emulator. vte 0.13 still pulls std, so it is OPTIONAL
# behind `terminal_vt` — off for the kernel's no_std link of raeshell, on for the
# userspace terminal (and the host KAT). The emulator only models grid + state.
vte = { version = "0.13", optional = true }

[features]
default = []
# Enable the vte-backed ANSI parser (userspace terminal; pulls std).
terminal_vt = ["vte"]
