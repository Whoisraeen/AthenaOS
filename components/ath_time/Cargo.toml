[package]
name = "ath_time"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# AthenaOS date/time + locale-aware formatting engine — the reusable civil-date
# core (Howard-Hinnant days-from-civil) plus ISO 8601 and locale-aware date/
# number/time formatting (LEGACY_GAMING_CONCEPT.md global-readiness: the OS must work
# in every language and locale, not just en-US). Foundational for the Clock /
# Calendar apps, log timestamps, scheduling, and the i18n date/number parity gap.
#
# `#![cfg_attr(not(test), no_std)]` (the ath_calc / ath_tokens pattern) so the lib
# is `no_std` in the shipped build and toggles to `std` only under `cfg(test)` for
# the harness — never run host tests on a bare no_std bin or `--workspace`.
# Zero dependencies, `#![forbid(unsafe_code)]`, never-panic on any input. Proven
# by FAIL-able host KATs: `cargo test -p ath_time` (no QEMU).

[dependencies]
