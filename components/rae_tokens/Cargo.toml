[package]
name = "rae_tokens"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# RaeenOS shared design tokens — the single source of truth for the design
# language (docs/design/design-language.md): spacing, radius, color palettes,
# the accent ramp + derive_accent(), elevation, type ramp, motion, glass.
#
# Per ADR 0003 (docs/decisions/0003-design-token-crate-home.md) this is a
# zero-dependency `#![no_std]` crate so BOTH the bare-metal kernel
# (window_chrome.rs / theme_engine.rs / compositor chrome) AND userspace
# (raeui re-exports it as `raeui::tokens`, raeshell, the bundled apps) consume
# ONE token home — ending the ~30-file `const ACCENT` duplication. NOT an ABI
# crate: `rae_abi` is frozen; visual tokens churn here without an [interface]
# commit or ABI_VERSION bump.
#
# `#![cfg_attr(not(test), no_std)]` so `cargo test -p rae_tokens` links std for
# the host KATs (per project memory: never run host tests on a bare no_std bin
# or `--workspace`; a no_std LIB toggled to std under cfg(test) is the pattern).
# Math is integer/f32 only — no `libm` needed (the only f32 path, WCAG
# luminance, uses a polynomial sRGB→linear approximation, no transcendentals).

[dependencies]
