[package]
name = "raessh"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# RaeenOS SSH server — remote interactive access to a running RaeenOS
# (RaeNet, Concept §"the user owns the machine" + real protocols above L3).
# You SSH into the OS and get a RaeShell session; the transport is SSH-2.0
# (RFC 4251-4254) built ENTIRELY on rae_crypto — curve25519-sha256 key
# exchange, ssh-ed25519 host key + publickey auth, chacha20-poly1305@openssh
# packet cipher. No OpenSSL, no libssh; the protocol state machine is pure
# logic so it is host-KAT-provable against real OpenSSH wire bytes before it
# ever touches a socket.
#
# `#![cfg_attr(not(test), no_std)]` + alloc (the rae_otp / rae_kv pattern):
# no_std in every shipped build, std only under cfg(test) for the host KATs.
# `#![forbid(unsafe_code)]`, never-panic on any peer input (a remote attacker
# controls every byte). The FAIL-able proof is `cargo test -p raessh` —
# real OpenSSH KEXINIT bytes + RFC framing vectors, no QEMU, no image.

[dependencies]
rae_crypto = { path = "../rae_crypto" }
