# RaeenOS embedded key-value store — structured, durable, ordered persistence for
# the first-party apps (Mail, Calendar, Notes, Settings) and the switcher on-ramp
# (RaeenOS_Concept.md §Compatibility Strategy criterion #5: "import & keep my
# stuff" needs somewhere to *put* it). Raw files give you bytes; an app that wants
# "list every message in mail/inbox/", "look up a setting by key", or "snapshot my
# notes to a RaeFS bucket and load them back" needs an ordered, bounds-checked,
# integrity-checked store. Nothing else in the tree provides that — rae_kv is that
# infrastructure layer.
#
# Zero runtime dependencies: the store is a sorted `BTreeMap<Vec<u8>,Vec<u8>>`
# (from `alloc` — correct and ordered, no hand-rolled on-disk B-tree) and the
# persistence format is a compact, versioned, length-prefixed byte layout with a
# from-scratch CRC-32 integrity trailer. The value here is the ordered API +
# the serializable snapshot format + hostile-input safety, NOT a novel codec, so
# there is nothing external to reuse.
#
# `#![cfg_attr(not(test), no_std)]` (the rae_pim / rae_zip / rae_json pattern):
# `no_std` + `alloc` in every shipped build, `std` only under `cfg(test)` for the
# host KATs. `#![forbid(unsafe_code)]`, never-panic / never-OOM on a corrupt,
# truncated, or hostile blob: entry count, key size, value size, and total size
# are all bounded BEFORE allocating, and the CRC is verified before any entry is
# trusted. Run the FAIL-able proof with `cargo test -p rae_kv` — no QEMU, no image.

