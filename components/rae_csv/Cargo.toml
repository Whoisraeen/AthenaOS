# AthenaOS CSV (RFC 4180) parser + serializer — the daily-driver "open my .csv
# and see a table" gap (LEGACY_GAMING_CONCEPT.md §"the user owns the machine": your
# data files open with no cloud, no account, no friction). Foundational,
# zero-dep, never-panic infrastructure: a Files Quick Look table, a spreadsheet
# viewer, settings/data import-export all share one correct CSV core.
#
# `#![cfg_attr(not(test), no_std)]` (the rae_json / rae_calc pattern) so the lib
# is `no_std` + `alloc` in every shipped build and toggles to `std` only under
# `cfg(test)` for the host KAT harness. Run the FAIL-able proof with
# `cargo test -p rae_csv` — no QEMU, no image build. Treats all input as hostile
# (an untrusted-bytes parser): malformed quoting returns `Err` or recovers, and
# no `unwrap`/`expect`/raw-index panic is reachable from `parse`.

