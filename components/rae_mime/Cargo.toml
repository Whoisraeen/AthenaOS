# RaeenOS file-association / MIME resolver — a zero-dependency, never-panic,
# `no_std` core that answers "what is this file, and what opens it?"
# (RaeenOS_Concept.md §"Built for people who care about how things feel." /
# daily-driver table stakes). Today RaeenOS has ZERO file-association registry:
# a user can't open a downloaded file by double-clicking it. This crate is the
# infra-first foundation for that — MIME detection by extension AND by magic
# bytes (so mislabeled / extension-less files still resolve), plus a queryable
# default-app registry (default app + ordered "Open With" candidates). It is
# deliberately wired into nothing this slice: the Files "Open With" menu and the
# kernel double-click-launch path are later slots.
#
# `#![cfg_attr(not(test), no_std)]` (the rae_tar / rae_hash / rae_json pattern):
# the lib is `no_std` + `alloc` in every shipped build and toggles to `std` only
# under `cfg(test)` for the host KAT harness. Zero dependencies,
# `#![forbid(unsafe_code)]`, never-panic on empty/garbage input. Run the FAIL-able
# proof with `cargo test -p rae_mime` — no QEMU, no image build.

