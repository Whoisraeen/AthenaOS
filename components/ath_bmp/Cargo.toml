# AthenaOS BMP + ICO decoder — pixels and favicons, not bytes
# (LEGACY_GAMING_CONCEPT.md §web / media: a browser that can't show a site's favicon
# and an OS that can't render a Windows bitmap aren't daily drivers). BMP rounds
# out raster coverage alongside the existing PNG/JPEG/GIF decoders; ICO is the
# favicon container the web pillar needs (favicons ship as .ico). A from-scratch,
# zero-dependency parser for BITMAPFILEHEADER/INFOHEADER (1/4/8/24/32-bit,
# top-down + bottom-up) and the ICONDIR table (embedded BMP DIB with AND-mask
# alpha, or embedded PNG routed to the PNG decoder).
#
# `#![cfg_attr(not(test), no_std)]` (the ath_gif / ath_json pattern) so the lib is
# `no_std` + `alloc` in every shipped build and toggles to `std` only under
# `cfg(test)` for the host KAT harness. Run the FAIL-able proof with
# `cargo test -p ath_bmp` — no QEMU, no image build. Treats every byte as hostile
# (favicons come from untrusted websites): no `unwrap`/`expect`/raw-index-panic
# is reachable from `decode_bmp`/`decode_ico`, and dimensions / pixel budget /
# entry count are all bounded before any allocation.

