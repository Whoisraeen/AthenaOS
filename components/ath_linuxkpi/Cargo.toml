[package]
name = "ath_linuxkpi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Linux Kernel Programming Interface shim for userspace driver daemons (Phase 1)"

[lib]
# `staticlib` deferred until a C driver links against `ath_linuxkpi` (needs panic handler).
crate-type = ["rlib"]

[features]
# Host test harness builds (tools/linuxkpi_harness): gate out the libc-shadow
# `string` C symbols (memcpy/memset/strlen/...) that collide with the platform
# CRT when this crate links into a std host binary. The kernel/bare-metal build
# never enables this, so the shim still provides libc there.
hosttest = []
# Standalone C-linkable staticlib: adds the `#[panic_handler]` a final artifact
# needs. Enable ONLY when building the staticlib a C driver links against
# (`cargo rustc --features clib --crate-type staticlib`); the Rust daemons
# consume the rlib without this (they define their own panic handler).
clib = []
# Off-target RUNNER builds (tools/amdgpu_hostrun): the syscall seam becomes a
# FUNCTIONAL Linux-host implementation (mmap-backed ioremap/map_phys, file-backed
# request_firmware, stderr printk, real clock) so the REAL amdgpu C init graph can
# be executed and debugged on the dev box — the GPU equivalent of tools/aml_probe.
# Inert until the runner calls `host::hostrun_install()`, so cargo feature
# unification with `hosttest` consumers (linuxkpi_harness) cannot change their
# behavior. Takes precedence over `hosttest` when both are enabled.
hostrun = []
# The real-amdgpu daemon links upstream DRM core implementations for the render
# path. Gate out the older Rust drm_exec ABI replacement in that build so one
# authoritative, header-matched implementation owns the exported C symbols.
upstream_drm_core = []

[dependencies]
ath_abi = { path = "../ath_abi" }
# Real freeing heap for the daemon-local kmalloc arena (same crate the kernel
# uses). Replaces the Phase-1 bump allocator so a running driver's alloc/free
# churn does not exhaust the heap.
linked_list_allocator = "0.10"
spin = { version = "0.9", default-features = false, features = ["spin_mutex"] }
