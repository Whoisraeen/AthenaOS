[package]
name = "rae_xlsx"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# RaeenOS XLSX (Excel) reader — "open my spreadsheets" (RaeenOS_Concept.md
# §Compatibility Strategy / office-style productivity, the natural follow-up to
# rae_docx). A Windows/macOS switcher brings a folder of .xlsx files; an OS that
# can't open them isn't a daily driver. An .xlsx IS a ZIP container of Office Open
# XML (SpreadsheetML), so this crate REUSES `rae_zip` for the archive layer (no
# reimplemented inflate) and adds a minimal, never-panic SpreadsheetML parser over
# the workbook/sharedStrings/worksheet parts to build a cell-addressed model plus a
# plain-data (CSV / display-string) extraction path.
#
# `#![cfg_attr(not(test), no_std)]` (the rae_docx / rae_zip pattern): the lib is
# `no_std` + `alloc` in every shipped build and toggles to `std` only under
# `cfg(test)` for the host KAT harness. Run the FAIL-able proof with
# `cargo test -p rae_xlsx` — no QEMU, no image build. Treats every byte as hostile
# (document parsers are an RCE surface): no `unwrap`/`expect`/raw-index-panic is
# reachable from `Workbook::open`, every decompressed part is size-capped, and the
# row/col/cell counts plus XML nesting depth / element count are bounded before
# allocation. No formula evaluator (a reader captures Excel's cached <v>).

[dependencies]
rae_zip = { path = "../rae_zip" }
