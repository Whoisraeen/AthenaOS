# AthenaOS encoding utilities — base64 (standard + URL-safe), URL percent-encoding,
# and hex. The lingua franca of the web/HTTP/PWA stack (LEGACY_GAMING_CONCEPT.md §"web
# apps via PWA support that actually feels native"): data: URIs, HTTP Basic auth,
# URL query encoding. Foundational, zero-dep, never-panic infrastructure wired
# into no consumer this slice.
#
# `#![cfg_attr(not(test), no_std)]` (the ath_json / ath_calc pattern) so the lib
# is `no_std` + `alloc` in every shipped build and toggles to `std` only under
# `cfg(test)` for the host KAT harness. Run the FAIL-able proof with
# `cargo test -p ath_encode` — no QEMU, no image build. Treats all input as
# hostile (these decode untrusted web/URL bytes): every error path returns `Err`,
# no `unwrap`/`expect`/raw-index panic is reachable from any decoder.

