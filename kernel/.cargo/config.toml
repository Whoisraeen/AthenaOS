# When you run `cargo` from inside the kernel/ directory, build for bare metal
# by default. When you build the kernel from the workspace root (e.g. via xtask),
# pass `--target x86_64-unknown-none` explicitly — this file only applies when
# cargo is invoked from kernel/ or a child directory.
[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = []
