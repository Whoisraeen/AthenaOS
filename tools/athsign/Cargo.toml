# athsign — AthenaOS detached-signature tool (Ed25519, RFC 8032). Signs kernel
# images / update payloads / app bundles with the SHARED `ath_crypto` Ed25519,
# so anything the kernel or athupdate verifies was produced by the same proven
# implementation. Host tool; its own workspace so it stays out of the main build.
#
#   cargo run --manifest-path tools/athsign/Cargo.toml -- selftest
[package]
name = "athsign"
version = "0.0.1"
edition = "2021"
publish = false

[[bin]]
name = "athsign"
path = "main.rs"

[dependencies]
ath_crypto = { path = "../../components/ath_crypto" }

[workspace]
