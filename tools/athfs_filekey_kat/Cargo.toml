# Host harness for AthFS per-file (FSCRYPT-equivalent) key derivation, Phase 5.2.
# Reproduces the kernel's `EncryptionKey::derive` + `file_encryption_key`
# byte-for-byte using the SHARED `ath_crypto` HMAC-SHA256 primitive (the same
# code the kernel HKDF uses), so this validates the real derivation — not a
# private copy — while the QEMU kernel build is embargoed.
#
#   cargo run --release --manifest-path tools/athfs_filekey_kat/Cargo.toml
#
# Declared as its own workspace so it stays out of the main workspace build.
[package]
name = "athfs_filekey_kat"
version = "0.0.1"
edition = "2021"
publish = false

[[bin]]
name = "athfs_filekey_kat"
path = "main.rs"

[dependencies]
ath_crypto = { path = "../../components/ath_crypto" }

[workspace]
