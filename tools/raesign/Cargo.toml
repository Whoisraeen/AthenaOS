# raesign — RaeenOS detached-signature tool (Ed25519, RFC 8032). Signs kernel
# images / update payloads / app bundles with the SHARED `rae_crypto` Ed25519,
# so anything the kernel or raeupdate verifies was produced by the same proven
# implementation. Host tool; its own workspace so it stays out of the main build.
#
#   cargo run --manifest-path tools/raesign/Cargo.toml -- selftest
[package]
name = "raesign"
version = "0.0.1"
edition = "2021"
publish = false

[[bin]]
name = "raesign"
path = "main.rs"

[dependencies]
rae_crypto = { path = "../../components/rae_crypto" }

[workspace]
